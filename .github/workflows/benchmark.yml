name: benchmark

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    # MLX requires Apple Silicon; the baseline peaks at ~27 GB RAM, so the
    # 48 GB tier is the smallest Blacksmith Mac that fits.
    runs-on: blacksmith-12vcpu-macos-latest
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the modifiable-surface guard can diff against the base.
          fetch-depth: 0

      # Participant submissions come from forks; same-repo PRs are maintainers
      # and may touch the harness/CI, so the guard only polices fork PRs.
      - name: Enforce modifiable surface
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # The allowlist comes from the BASE branch so a PR can't grant itself access.
          allowed="$(git show "${BASE_SHA}:benchmark.json" \
            | python3 -c 'import json,sys; print("\n".join(json.load(sys.stdin)["editablePaths"]))')"
          changed="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          bad=0
          while IFS= read -r f; do
            [[ -z "${f}" ]] && continue
            if ! grep -qxF "${f}" <<<"${allowed}"; then
              echo "::error file=${f}::${f} is outside the modifiable surface (see editablePaths in benchmark.json)"
              bad=1
            fi
          done <<<"${changed}"
          exit "${bad}"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # Blacksmith transparently serves actions/cache from colocated storage.
      # The reference checkpoint never changes, so the key is static.
      - name: Cache reference weights (~18 GB)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: quantizationfail/reference_weights
          key: reference-weights-gemma-4-26B-A4B-it-qat-4bit-v1

      - name: Cache pip downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      # Online phase: installs the venv and, only on a weights cache miss,
      # downloads the reference checkpoint (`quantizationfail weights` is idempotent).
      - name: Setup
        run: ./setup.sh

      - name: Verify the sandbox blocks network
        run: |
          if sandbox-exec -f .github/sandbox/deny-network.sb \
              curl -fsS --max-time 10 https://example.com -o /dev/null 2>/dev/null; then
            echo "::error::sandbox-exec did not block network access; refusing to run the benchmark"
            exit 1
          fi
          echo "Network egress is blocked inside the sandbox."

      # Offline phase: transform.py and the benchmark run with no network and no sudo.
      # The proxy vars point at a closed local port so anything that ignores the
      # sandbox profile still fails fast instead of hanging.
      - name: Benchmark (offline)
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
          QUANTIZATIONFAIL_NOTE: "ci ${{ github.event_name }} ${{ github.sha }}"
        run: |
          sandbox-exec -f .github/sandbox/deny-network.sb env \
            http_proxy=http://127.0.0.1:9 https_proxy=http://127.0.0.1:9 \
            HTTP_PROXY=http://127.0.0.1:9 HTTPS_PROXY=http://127.0.0.1:9 \
            ./benchmark.sh

      - name: Report score
        run: |
          python3 - <<'EOF'
          import json, os
          payload = json.load(open("score.json"))
          metrics = payload.get("metrics", {})
          lines = [
              "## quantizationfail benchmark",
              "",
              f"**Score: `{payload['score']}`** (lower is better)",
              "",
              "| metric | value |",
              "|---|---|",
          ]
          # The metrics schema evolves with the harness; report whatever it emits.
          lines += [f"| {k} | {v} |" for k, v in sorted(metrics.items())]
          lines.append("")
          summary = "\n".join(lines)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary)
          print(summary)
          EOF

      - name: Upload score artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            score.json
            results.tsv
          if-no-files-found: ignore

      # Fork PRs get a read-only token, so the comment is best-effort and
      # same-repo only; the step summary and artifact carry the score everywhere.
      - name: Comment score on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('score.json', 'utf8'));
            const metrics = payload.metrics || {};
            const marker = '<!-- quantizationfail-benchmark -->';
            const body = [
              marker,
              '## quantizationfail benchmark',
              '',
              `**Score: \`${payload.score}\`** (lower is better)`,
              '',
              '| metric | value |',
              '|---|---|',
              // The metrics schema evolves with the harness; report whatever it emits.
              ...Object.keys(metrics).sort().map(k => `| ${k} | ${metrics[k]} |`),
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
