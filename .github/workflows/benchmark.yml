name: benchmark

# Dispatch-only: Yukon dispatches on yukon/baseline/* and submissions/*
# branches it constructs, then reads the score from the uploaded artifact.
# Maintainers can dispatch manually on any branch (e.g. on main to warm the
# weights cache). No PR or push triggers: macOS runner minutes are expensive,
# and nothing should be able to burn them without an explicit dispatch.
on:
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    # MLX requires Apple Silicon. DS4-Flash peaks at ~8 GB GPU RAM during
    # inference, but transform.py reads/writes ~141 GB of weights so the
    # runner needs ample disk (≥300 GB) and RAM (≥32 GB). 12 vCPU is the
    # largest macOS SKU Blacksmith offers (there is no 16 vCPU macOS tier).
    runs-on: blacksmith-12vcpu-macos-15
    # Decode: 512 tokens × ~0.5 s/tok = ~4 min. Prefill + correctness + setup
    # + possible transform (~10 min on NVMe) + cache restore bring total to
    # ~45 min on a warm cache, ~60 min when transform must re-run. A cold
    # first run (empty sticky disks) also pays the reference download, so
    # allow generous headroom.
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the modifiable-surface guard can diff against the base.
          fetch-depth: 0

      # Yukon already enforces editablePaths server-side when it builds candidate
      # branches; re-checking here is defense in depth against orchestrator bugs.
      - name: Enforce modifiable surface (yukon candidate branches)
        if: startsWith(github.ref_name, 'submissions/')
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")" \
            .github/scripts/enforce-modifiable-surface.sh

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Cache pip downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      # Install venv and tooling; skip the HF weight download — sticky disks
      # handle weight persistence so we control the download explicitly below.
      - name: Install dependencies
        run: MLXFAST_SKIP_WEIGHTS_DOWNLOAD=1 ./setup.sh

      # Sticky disks mount a persistent Ceph-backed ext4 volume in ~3 seconds
      # regardless of size — far faster than restoring 141 GB from cache.
      # The disk commits after the job and is reused on the next run.
      # Both disks are always mounted: reference weights stay resident so
      # transform.py can re-run whenever participant source files change
      # (benchmark.sh detects this via its source-hash check).
      - name: Mount transformed weights disk (~141 GB)
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-ds4-weights
          path: weights

      - name: Mount reference weights disk (~141 GB)
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-ds4-reference
          path: mlxfast/reference_weights/DeepSeek-V4-Flash-4bit

      # On the very first run the reference disk is empty — download the
      # checkpoint so benchmark.sh can run transform.py.
      - name: Download reference weights (first run only)
        run: |
          if [[ ! -f mlxfast/reference_weights/DeepSeek-V4-Flash-4bit/config.json ]]; then
            .venv/bin/python -m mlxfast.cli weights
          fi

      # Offline phase: benchmark.sh self-sandboxes — it proves the Seatbelt
      # profile (tools/deny-network.sb) blocks egress, then re-execs itself
      # under sandbox-exec with no network and no sudo.
      # benchmark.sh skips transform when weights/ is populated with the
      # correct source hash; otherwise it re-runs transform.py first.
      - name: Benchmark (offline)
        env:
          MLXFAST_NOTE: "ci ${{ github.event_name }} ${{ github.sha }}"
        run: ./benchmark.sh

      - name: Upload score artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            score.json
            results.tsv
          if-no-files-found: ignore
