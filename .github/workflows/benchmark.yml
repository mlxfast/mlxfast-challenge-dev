name: benchmark

# Dispatch-only: Yukon dispatches on yukon/baseline/* and submissions/* branches
# it constructs, then reads the score from the uploaded artifact. Maintainers can
# dispatch manually on any branch. No PR/push triggers: runner minutes (esp.
# macOS) are expensive, and nothing should burn them without an explicit dispatch.
on:
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Two-step pipeline. The transform needs the reference checkpoint AND its output
# on disk at once (~154 GB + ~141 GB ≈ 295 GB), which exceeds the 250 GB macOS
# runner; and MLX is what reads/writes the weights. So:
#   1) transform  — runs on a 750 GB Linux runner (MLX installs via mlx[cpu]),
#      producing weights/, and publishes it to the Actions cache.
#   2) benchmark  — runs on the Apple-Silicon macOS runner (Metal), restoring
#      weights/ from the cache (≤141 GB, fits 250 GB) and measuring performance.
# The cache, keyed on transform.py only, is the cross-OS handoff: an
# mlx_models-only submission is a cache hit, so step 1 is a no-op and step 2 just
# benchmarks. Correctness checking is currently disabled (perf-only), so no
# reference is needed on the macOS side.
#
# NOTE: weights/ is ~141 GB — well above the 25 GB default Actions-cache quota.
# This requires a cache-size increase from Blacksmith (support@blacksmith.sh);
# without it the cache save/restore will fail.

jobs:
  # ── Step 1: transform on Linux (750 GB disk fits reference + output) ──────────
  transform:
    runs-on: blacksmith-16vcpu-ubuntu-2404  # 16 vCPU, 64 GB RAM, 750 GB disk
    timeout-minutes: 150
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the modifiable-surface guard can diff against the base.
          fetch-depth: 0

      # Yukon enforces editablePaths server-side; re-check here (fail fast, before
      # the expensive transform) as defense in depth against orchestrator bugs.
      - name: Enforce modifiable surface (yukon candidate branches)
        if: startsWith(github.ref_name, 'submissions/')
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")" \
            .github/scripts/enforce-modifiable-surface.sh

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # weights/ is a deterministic function of transform.py (NOT mlx_models), so
      # key the cache on transform.py alone. On a hit, every step below is skipped
      # and the existing cache is the handoff to the benchmark job.
      - name: Probe transformed-weights cache
        id: probe
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: weights
          key: ds4-weights-v1-${{ hashFiles('transform.py') }}
          lookup-only: true

      # Everything below runs only on a weights-cache miss (transform.py changed
      # or first run). The reference checkpoint never changes, so it lives on a
      # persistent Linux sticky disk (Ceph-backed, mounts in ~3 s, no 25 GB cache
      # quota) — downloaded once and reused on every transform, independent of
      # whether the weights cache works.
      - name: Mount reference weights disk (~154 GB)
        if: steps.probe.outputs.cache-hit != 'true'
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-ds4-reference
          path: mlxfast/reference_weights/DeepSeek-V4-Flash-4bit

      # Install deps only (mlx[cpu] CPU backend on Linux; skips macOS-only
      # mactop/Homebrew). The reference download is handled explicitly below.
      - name: Install dependencies
        if: steps.probe.outputs.cache-hit != 'true'
        run: MLXFAST_SKIP_WEIGHTS_DOWNLOAD=1 ./setup.sh

      # First run only: the sticky disk is empty, so download the reference.
      # On every later run it's already resident — no 154 GB re-download.
      - name: Download reference (first run only)
        if: steps.probe.outputs.cache-hit != 'true'
        run: |
          if [[ ! -f mlxfast/reference_weights/DeepSeek-V4-Flash-4bit/config.json ]]; then
            .venv/bin/python -m mlxfast.cli weights
          fi

      - name: Transform (MLX CPU backend) + seed source hash
        if: steps.probe.outputs.cache-hit != 'true'
        run: |
          .venv/bin/python transform.py
          .venv/bin/python tools/benchmark_contract.py source-hash > weights/.benchmark-source.sha256

      - name: Publish transformed weights to cache
        if: steps.probe.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: weights
          key: ds4-weights-v1-${{ hashFiles('transform.py') }}

  # ── Step 2: benchmark on macOS (Metal; only needs weights/, ≤141 GB) ──────────
  benchmark:
    needs: transform
    runs-on: blacksmith-12vcpu-macos-15  # Apple Silicon; 250 GB disk (no 16 vCPU macOS tier)
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Cache pip downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      # macOS: setup.sh installs mactop + MLX (Metal backend). Skip the weight
      # download — the benchmark only needs the transformed weights/ (below), not
      # the reference checkpoint (correctness is disabled, so no reference run).
      - name: Install dependencies
        run: MLXFAST_SKIP_WEIGHTS_DOWNLOAD=1 ./setup.sh

      # The transform job produced weights/ (incl. .benchmark-source.sha256), so
      # benchmark.sh reuses it without re-transforming and never needs the
      # reference checkpoint here.
      - name: Restore transformed weights from cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: weights
          key: ds4-weights-v1-${{ hashFiles('transform.py') }}
          fail-on-cache-miss: true

      # Offline phase: benchmark.sh proves the Seatbelt profile (tools/deny-network.sb)
      # blocks egress, then re-execs itself under sandbox-exec with no network.
      - name: Benchmark (offline, perf-only)
        env:
          MLXFAST_NOTE: "ci ${{ github.event_name }} ${{ github.sha }}"
        run: ./benchmark.sh

      - name: Upload score artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            score.json
            results.tsv
          if-no-files-found: ignore
