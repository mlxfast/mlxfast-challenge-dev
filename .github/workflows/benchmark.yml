name: benchmark

# Dispatch-only: maintainers or the benchmark orchestrator start the expensive
# Apple Silicon run explicitly. No PR/push triggers should burn macOS minutes.
on:
  workflow_dispatch:
    inputs:
      reference_base_url:
        description: "Optional HTTP base URL for reference checkpoint files, such as an R2 public/Worker prefix. Defaults to setup.sh/HF or MLXFAST_REFERENCE_BASE_URL secret."
        required: false
        type: string
      correctness_golden_url:
        description: "Optional URL for precomputed correctness_golden.json. If empty, the workflow restores or creates a cached Blacksmith-generated golden."
        required: false
        type: string
      reference_download_jobs:
        description: "Parallel shard downloads for setup.sh."
        required: false
        default: "8"
        type: string
      reference_min_free_gib:
        description: "Minimum free GiB required before reference checkpoint download."
        required: false
        default: "170"
        type: string
      verify_transform:
        description: "Run deterministic transform verification before timing."
        required: false
        default: false
        type: boolean
      run_benchmark:
        description: "Run the timed benchmark after the correctness gate."
        required: false
        default: true
        type: boolean
      preserve_golden_only:
        description: "Restore the cached correctness golden and upload it as an artifact without setup, transform, correctness, or benchmark."
        required: false
        default: false
        type: boolean
      trace_correctness_step:
        description: "Optional maintainer diagnostic: trace logits at a 0-based correctness decode step. Disabled on submission branches."
        required: false
        default: ""
        type: string
      trace_correctness_top_k:
        description: "Number of logits to include when trace_correctness_step is set."
        required: false
        default: "16"
        type: string

concurrency:
  group: benchmark-${{ github.ref }}-${{ inputs.preserve_golden_only && 'preserve-golden' || (inputs.run_benchmark && 'full' || 'correctness-only') }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 720
    env:
      MLXFAST_CORRECTNESS_GOLDEN_CACHE_VERSION: v1
      MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH: .mlxfast-cache/correctness-golden/correctness_golden.json
      MLXFAST_REFERENCE_BASE_URL: ${{ inputs.reference_base_url || secrets.MLXFAST_REFERENCE_BASE_URL }}
      MLXFAST_REFERENCE_AUTH_HEADER: ${{ secrets.MLXFAST_REFERENCE_AUTH_HEADER }}
      MLXFAST_REFERENCE_DOWNLOAD_JOBS: ${{ inputs.reference_download_jobs }}
      MLXFAST_REFERENCE_MIN_FREE_GIB: ${{ inputs.reference_min_free_gib }}
      MLXFAST_CORRECTNESS_GOLDEN_URL: ${{ inputs.correctness_golden_url || secrets.MLXFAST_CORRECTNESS_GOLDEN_URL }}
      MLXFAST_CORRECTNESS_GOLDEN_AUTH_HEADER: ${{ secrets.MLXFAST_CORRECTNESS_GOLDEN_AUTH_HEADER }}
      MLXFAST_VERIFY_TRANSFORM: ${{ inputs.verify_transform && '1' || '0' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Enforce modifiable surface
        if: startsWith(github.ref_name, 'submissions/') || startsWith(github.ref_name, 'yukon/submissions/')
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")" \
            .github/scripts/enforce-modifiable-surface.sh

      - name: Check correctness golden source
        run: |
          set -euo pipefail
          if [[ -n "${MLXFAST_CORRECTNESS_GOLDEN_URL:-}" ]]; then
            echo "benchmark: using configured correctness golden URL"
          else
            echo "benchmark: using cached Blacksmith-generated correctness golden"
          fi

      - name: Restore cached correctness golden
        id: restore-correctness-golden
        if: env.MLXFAST_CORRECTNESS_GOLDEN_URL == ''
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .mlxfast-cache/correctness-golden
          key: correctness-golden-${{ runner.os }}-${{ runner.arch }}-blacksmith-macos-26-${{ env.MLXFAST_CORRECTNESS_GOLDEN_CACHE_VERSION }}-${{ hashFiles('private_prompts.json', 'Package.resolved', 'Sources/MLXFastCore/Constants.swift', 'Sources/MLXFastCore/Golden.swift', 'Sources/MLXFastDeepSeekHarness/**') }}

      - name: Preserve cached correctness golden
        if: inputs.preserve_golden_only
        run: |
          set -euo pipefail
          if [[ ! -s "${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}" ]]; then
            echo "benchmark: cached correctness golden missing at ${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}" >&2
            echo "benchmark: cache-hit=${{ steps.restore-correctness-golden.outputs.cache-hit }}" >&2
            exit 1
          fi
          cp "${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}" correctness_golden.json
          shasum -a 256 correctness_golden.json > correctness_golden.json.sha256
          wc -c correctness_golden.json > correctness_golden.json.bytes

      - name: Upload preserved correctness golden artifact
        if: inputs.preserve_golden_only
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: correctness-golden-${{ github.run_id }}
          path: |
            correctness_golden.json
            correctness_golden.json.sha256
            correctness_golden.json.bytes
          if-no-files-found: error

      - name: Setup Swift harness and reference checkpoint
        if: ${{ !inputs.preserve_golden_only }}
        run: ./setup.sh

      - name: Transform reference checkpoint
        if: ${{ !inputs.preserve_golden_only }}
        run: .build/release/mlxfast-swift transform

      - name: Prepare correctness golden
        id: prepare-correctness-golden
        if: ${{ !inputs.preserve_golden_only }}
        run: |
          set -euo pipefail
          if [[ -n "${MLXFAST_CORRECTNESS_GOLDEN_URL:-}" ]]; then
            if [[ -n "${MLXFAST_CORRECTNESS_GOLDEN_AUTH_HEADER:-}" ]]; then
              echo "benchmark: downloading correctness_golden.json with configured auth header"
              curl \
                --fail \
                --location \
                --retry 5 \
                --retry-all-errors \
                --retry-delay 2 \
                -H "${MLXFAST_CORRECTNESS_GOLDEN_AUTH_HEADER}" \
                --output correctness_golden.json \
                "${MLXFAST_CORRECTNESS_GOLDEN_URL}"
            else
              echo "benchmark: downloading correctness_golden.json"
              curl \
                --fail \
                --location \
                --retry 5 \
                --retry-all-errors \
                --retry-delay 2 \
                --output correctness_golden.json \
                "${MLXFAST_CORRECTNESS_GOLDEN_URL}"
            fi
          elif [[ -s "${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}" ]]; then
            echo "benchmark: using cached correctness_golden.json"
            cp "${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}" correctness_golden.json
          else
            case "${GITHUB_REF_NAME}" in
              submissions/*|yukon/submissions/*)
                echo "benchmark: correctness golden cache miss on submission branch; refusing to generate from submitted code." >&2
                echo "benchmark: warm the cache from a trusted branch or provide correctness_golden_url." >&2
                exit 1
                ;;
            esac
            echo "benchmark: correctness golden cache miss; generating on this Blacksmith runner"
            mkdir -p "$(dirname "${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}")"
            .build/release/mlxfast-swift make-golden \
              --weights weights \
              --prompt-file private_prompts.json \
              --output "${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}"
            cp "${MLXFAST_CORRECTNESS_GOLDEN_CACHE_PATH}" correctness_golden.json
            echo "generated=true" >> "${GITHUB_OUTPUT}"
          fi
          test -s correctness_golden.json

      - name: Save cached correctness golden
        if: env.MLXFAST_CORRECTNESS_GOLDEN_URL == '' && steps.prepare-correctness-golden.outputs.generated == 'true' && !startsWith(github.ref_name, 'submissions/') && !startsWith(github.ref_name, 'yukon/submissions/')
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .mlxfast-cache/correctness-golden
          key: ${{ steps.restore-correctness-golden.outputs.cache-primary-key }}

      - name: Upload correctness golden artifact
        if: ${{ !inputs.preserve_golden_only }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: correctness-golden-${{ github.run_id }}
          path: correctness_golden.json
          if-no-files-found: error

      - name: Correctness
        if: ${{ !inputs.preserve_golden_only }}
        run: |
          set -euo pipefail
          .build/release/mlxfast-swift correctness \
            --weights weights \
            --golden correctness_golden.json \
            > correctness-report.json

      - name: Benchmark
        if: ${{ !inputs.preserve_golden_only && inputs.run_benchmark }}
        env:
          MLXFAST_NOTE: "ci ${{ github.event_name }} ${{ github.sha }}"
          MLXFAST_SKIP_TRANSFORM: "1"
        run: ./benchmark.sh

      - name: Trace correctness mismatch
        if: always() && !inputs.preserve_golden_only && inputs.trace_correctness_step != '' && !startsWith(github.ref_name, 'submissions/')
        run: |
          set -euo pipefail
          .build/release/mlxfast-swift correctness-trace \
            --weights weights \
            --golden correctness_golden.json \
            --step "${{ inputs.trace_correctness_step }}" \
            --top-k "${{ inputs.trace_correctness_top_k }}" \
            > correctness-trace.json

      - name: Upload score artifacts
        if: always() && !inputs.preserve_golden_only
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            correctness-report.json
            correctness_golden.json
            score.json
            score.json.sha256
            benchmark-integrity.json
            results.tsv
          if-no-files-found: ignore

      - name: Upload correctness trace artifact
        if: always() && !inputs.preserve_golden_only && inputs.trace_correctness_step != '' && !startsWith(github.ref_name, 'submissions/')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: correctness-trace-${{ github.run_id }}
          path: correctness-trace.json
          if-no-files-found: error
