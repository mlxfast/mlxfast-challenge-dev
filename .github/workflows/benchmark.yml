name: benchmark

# Dispatch-only: maintainers or the benchmark orchestrator start the expensive
# Apple Silicon run explicitly. No PR/push triggers should burn macOS minutes.
on:
  workflow_dispatch:
    inputs:
      reference_base_url:
        description: "Optional HTTP base URL for reference checkpoint files, such as an R2 public/Worker prefix. Defaults to setup.sh/HF or MLXFAST_REFERENCE_BASE_URL secret."
        required: false
        type: string
      correctness_golden_url:
        description: "Optional URL for precomputed correctness_golden.json. If empty, the workflow generates a temporary golden file from private_prompts.json."
        required: false
        type: string
      prompt_file:
        description: "Prompt manifest used to generate temporary correctness_golden.json when no golden URL is provided."
        required: false
        default: "private_prompts.json"
        type: string
      reference_download_jobs:
        description: "Parallel shard downloads for setup.sh."
        required: false
        default: "4"
        type: string
      reference_min_free_gib:
        description: "Minimum free GiB required before reference checkpoint download."
        required: false
        default: "170"
        type: string
      reference_cache:
        description: "Restore/save the reference checkpoint through Actions/Blacksmith cache. Requires cache quota above the model size."
        required: false
        default: true
        type: boolean
      reference_cache_key:
        description: "Cache key for the complete reference checkpoint. Change when the checkpoint index changes."
        required: false
        default: "reference-macos-deepseek-v4-flash-4bit-be0366872ceb26fcbeb67aade5aed8b94eb53b49550d35cabbe9438b073a8637"
        type: string
      verify_transform:
        description: "Run deterministic transform verification before timing."
        required: false
        default: false
        type: boolean

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 720
    env:
      MLXFAST_REFERENCE_BASE_URL: ${{ inputs.reference_base_url || secrets.MLXFAST_REFERENCE_BASE_URL }}
      MLXFAST_REFERENCE_AUTH_HEADER: ${{ secrets.MLXFAST_REFERENCE_AUTH_HEADER }}
      MLXFAST_REFERENCE_DOWNLOAD_JOBS: ${{ inputs.reference_download_jobs }}
      MLXFAST_REFERENCE_MIN_FREE_GIB: ${{ inputs.reference_min_free_gib }}
      MLXFAST_CORRECTNESS_GOLDEN_URL: ${{ inputs.correctness_golden_url || secrets.MLXFAST_CORRECTNESS_GOLDEN_URL }}
      MLXFAST_CORRECTNESS_GOLDEN_AUTH_HEADER: ${{ secrets.MLXFAST_CORRECTNESS_GOLDEN_AUTH_HEADER }}
      MLXFAST_PROMPT_FILE: ${{ inputs.prompt_file }}
      MLXFAST_VERIFY_TRANSFORM: ${{ inputs.verify_transform && '1' || '0' }}
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Enforce modifiable surface
        if: startsWith(github.ref_name, 'submissions/')
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE_SHA="$(git merge-base origin/main "${HEAD_SHA}")" \
            .github/scripts/enforce-modifiable-surface.sh

      - name: Restore reference checkpoint cache
        if: ${{ inputs.reference_cache }}
        id: reference-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: reference_weights/DeepSeek-V4-Flash-4bit
          key: ${{ inputs.reference_cache_key }}

      - name: Setup Swift harness and reference checkpoint
        id: setup
        run: ./setup.sh

      - name: Transform reference checkpoint
        run: .build/release/mlxfast-swift transform

      - name: Prepare correctness golden
        run: |
          set -euo pipefail
          if [[ -n "${MLXFAST_CORRECTNESS_GOLDEN_URL:-}" ]]; then
            if [[ -n "${MLXFAST_CORRECTNESS_GOLDEN_AUTH_HEADER:-}" ]]; then
              echo "benchmark: downloading correctness_golden.json with configured auth header"
              curl \
                --fail \
                --location \
                --retry 5 \
                --retry-all-errors \
                --retry-delay 2 \
                -H "${MLXFAST_CORRECTNESS_GOLDEN_AUTH_HEADER}" \
                --output correctness_golden.json \
                "${MLXFAST_CORRECTNESS_GOLDEN_URL}"
            else
              echo "benchmark: downloading correctness_golden.json"
              curl \
                --fail \
                --location \
                --retry 5 \
                --retry-all-errors \
                --retry-delay 2 \
                --output correctness_golden.json \
                "${MLXFAST_CORRECTNESS_GOLDEN_URL}"
            fi
          else
            echo "benchmark: generating temporary correctness_golden.json from ${MLXFAST_PROMPT_FILE}"
            .build/release/mlxfast-swift make-golden \
              --weights weights \
              --prompt-file "${MLXFAST_PROMPT_FILE}" \
              --output correctness_golden.json
          fi
          test -s correctness_golden.json

      - name: Benchmark
        env:
          MLXFAST_NOTE: "ci ${{ github.event_name }} ${{ github.sha }}"
          MLXFAST_SKIP_TRANSFORM: "1"
        run: ./benchmark.sh

      - name: Upload score artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            score.json
            score.json.sha256
            benchmark-integrity.json
            results.tsv
          if-no-files-found: ignore

      - name: Save reference checkpoint cache
        if: ${{ always() && inputs.reference_cache && steps.setup.outcome == 'success' && steps.reference-cache.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: reference_weights/DeepSeek-V4-Flash-4bit
          key: ${{ steps.reference-cache.outputs.cache-primary-key || inputs.reference_cache_key }}
